  #     - .env
  #   environment:
  #     # Compose will substitute these from the top-level .env (or your shell).
  #     # The hostname "postgres" is the service name and resolves on the docker network.
  #     DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
  #   depends_on:
  #     - postgres

volumes:
  postgres_data_volume:

networks:
  resto_bridge:
    driver: bridge
