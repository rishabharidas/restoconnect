services:
  postgres:
    image: postgres:18
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      # REMOVE THIS LINE:
      # POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      # CHANGE THE MOUNT POINT HERE:
      - postgres_data_volume:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - resto_bridge

  pgadmin:
    # We use 'latest' here, trusting it will contain a client >= PostgreSQL 18.
    image: dpage/pgadmin4:latest
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - resto_bridge
    depends_on:
      - postgres

  # Other services (uncommented for completeness)
