services:
  postgres:
    image: postgres:latest
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - resto_bridge

  pgadmin:
    image: dpage/pgadmin4:latest
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - resto_bridge
    depends_on:
      - postgres

  # resto_front:
  #   image: sveltekit-app:latest
  #   build:
  #     context: ./restoview
  #     dockerfile: Dockerfile
  #   ports:
  #     - "5173:5173"
  #   networks:
  #     - resto_bridge
  #   env_file:
  #     - .env

  resto_backend:
    image: rust:latest
    build:
      context: ./restolink
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - resto_bridge
    env_file:
      - .env

volumes:
  postgres_data:
    driver: local
    name: postgres_data_volume
    driver_opts:
      type: none
      o: bind
      device: /var/lib/postgresql/data

networks:
  resto_bridge:
    driver: bridge
